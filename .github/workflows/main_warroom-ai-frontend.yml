name: Build and deploy Node.js app to Azure Web App - warroom-ai-frontend

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4

        with:
          node-version: '22'

      - name: Install frontend dependencies

        run: |

          cd frontend

          npm install

      - name: Build frontend

        run: |

          cd frontend

          npm run build

      - name: Upload artifact

        uses: actions/upload-artifact@v4

        with:

          name: node-app

          path: frontend/dist

  deploy:

    runs-on: ubuntu-latest

    needs: build

    permissions:

      id-token: write

      contents: read

    steps:

      - name: Download artifact

        uses: actions/download-artifact@v4

        with:

          name: node-app

      - name: Login to Azure

        uses: azure/login@v2

        with:

          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FAD533552C6D481ABE811E27D367300B }}

          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_087BA1836E9249789A36950406365AB6 }}

          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E974AC41F2CE4D8A95649D422D877A04 }}

      - name: Deploy to Azure Web App

        uses: azure/webapps-deploy@v3

        with:

          app-name: warroom-ai-frontend

          package: .

