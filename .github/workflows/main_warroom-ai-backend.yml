name: Build and deploy Python app to Azure Web App - warroom-ai-backend

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - uses: actions/checkout@v4

      - name: Set up Python version

        uses: actions/setup-python@v5

        with:

          python-version: '3.12'

      - name: Install dependencies

        run: |

          cd backend

          pip install -r requirements.txt

      - name: Upload backend artifact

        uses: actions/upload-artifact@v4

        with:

          name: python-app

          path: backend

  deploy:

    runs-on: ubuntu-latest

    needs: build

    permissions:

      id-token: write

      contents: read

    steps:

      - name: Download artifact

        uses: actions/download-artifact@v4

        with:

          name: python-app

      - name: Login to Azure

        uses: azure/login@v2

        with:

          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E75DEA11E19747C69892452F08AC9EED }}

          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_71A74909FE8841738F0EC63F47A84079 }}

          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5918800792294A1EBDAB38045DA4CE47 }}

      - name: Deploy to Azure Web App

        uses: azure/webapps-deploy@v3

        with:

          app-name: warroom-ai-backend

          slot-name: Production

          package: .

